<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: Search engines read these to understand your page -->
  <title>Your Name | Portfolio</title>
  <meta name="description" content="A brief description of your awesome project or portfolio.">

  <!-- Typography: Importing 'Inter' from Google Fonts for a premium look -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <!-- CSS: Link to your stylesheet (make sure you have a style.css file) -->
  <style>
      body {
        background-color: #004d4d; /* Dark Navy Teal */
        color: white;
        margin: 0;
        /* Helvetica first, Arial as a backup */
        font-family: "Helvetica", "Arial", sans-serif;

        /* This centers all text on the page */
        text-align: center;

        /* Optional: This centers your content vertically too */
        display: flex;
        flex-direction: column;
        justify-content: center;
        min-height: 100vh;
      }

      .logo, .nav-links li a {
        color: white !important;
        text-decoration: none;
      }

      /* Keeps your list items from stacking strangely when centered */
      .nav-links {
        padding: 0;
        list-style: none;
      }

      .nav-links li {
        display: inline-block;
        margin: 0 15px;
      }
    </style>->
  <header>
    <nav>
      <div class="logo">MyBrand.</div>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#projects">Projects</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main>

    <!-- Hero Section: The first thing visitors see -->
    <section id="hero" class="hero">
      <h1>Hello, I'm <span class="highlight">Your Name</span></h1>
      <p>I build elegant and dynamic web applications.</p>
      <a href="#projects" class="btn-primary">View My Work</a>
    </section>

    <!-- Additional sections like About, Projects goes here -->

  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 Your Name. Built with HTML & CSS.</p>
  </footer>

  <!-- JavaScript: Link to your logic scripts at the bottom for faster page load -->
  <script src="script.js"></script>
</body>
</html>
