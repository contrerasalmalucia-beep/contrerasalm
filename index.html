<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Contreras | Art Portfolio</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* EMOJI CURSOR LOGIC
           This converts emojis into tiny, lightweight graphic codes
           so the browser can load them instantly without external files!
        */
        html, body {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>✨</text></svg>") 12 12, auto;
        }

        /* This changes the cursor to a star when hovering over clickable elements */
        a, model-viewer, button {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>⭐</text></svg>") 12 12, pointer !important;
        }

        body {
            background-color: #004d4d; /* Navy Teal */
            color: white;
            margin: 0;
            font-family: "Helvetica", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }

        /* Navigation Layout */
        .nav-links {
            list-style: none;
            padding: 0;
            margin: 20px 0 40px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 1px solid white;
            opacity: 0.9;
        }

        main {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .portfolio-img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            margin-bottom: 40px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .model-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Alma Contreras</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="portfolio.html">Art Portfolio</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <img src="assets/iteration1.png" alt="Iteration 1" class="portfolio-img">

        <section class="model-container">
            <h2>3D Artifact Study</h2>
            <model-viewer
                src="assets/assets.glb"
                poster="assets/lacmawall.png"
                alt="A 3D model of a creative artifact"
                shadow-intensity="1"
                camera-controls
                auto-rotate
                ar
                ar-modes="webxr scene-viewer quick-look"
                touch-action="pan-y">
            </model-viewer>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alma Contreras</p>
    </footer>

</body>
</html>
