<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Contreras | Art Portfolio</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body {
            background-color: #004d4d; /* Your Dark Navy Teal */
            color: white;
            margin: 0;
            font-family: "Helvetica", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 50px;
        }

        h1 {
            font-size: 3.5rem;
            margin-top: 20px;
            letter-spacing: 2px;
            text-align: center;
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 20px 0;
            text-align: center;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1.1rem;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: 0.3s;
        }

        .nav-links a:hover {
            border-bottom: 1px solid white;
        }

        /* 3D Model Container */
        .model-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            margin: 40px 0;
        }

        model-viewer {
            width: 80vw;
            max-width: 800px;
            height: 500px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h2 {
            margin-bottom: 20px;
            font-weight: 400;
        }

        footer {
            margin: 50px 0;
            font-size: 0.8rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <ul class="nav-links">
                <li><a href="portfolio.html">Art Portfolio</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Alma Contreras</h1>

        <section class="model-container">
            <h2>3D Artifact Study</h2>
            <model-viewer
                src="assets/assets.glb"
                poster="assets/lacmawall.png"
                alt="A 3D model of a creative artifact"
                shadow-intensity="1"
                camera-controls
                auto-rotate
                ar>
            </model-viewer>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alma Contreras</p>
    </footer>

</body>
</html>
