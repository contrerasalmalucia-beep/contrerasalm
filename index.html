<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alma Contreras | Art Portfolio</title>

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* ==========================================================================
           1. CUSTOM SPARKLING CURSOR EFFECT
           ========================================================================== */
        html, body {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>✨</text></svg>") 12 12, auto;
        }

        a, model-viewer, button {
            cursor: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='32' height='32' style='font-size:24px'><text y='24'>⭐</text></svg>") 12 12, pointer !important;
        }

        /* ==========================================================================
           2. GLOBAL PAGE STYLES & LAYOUT
           ========================================================================== */
        body {
            background-color: #004d4d; /* Navy Teal */
            color: white;
            margin: 0;
            font-family: "Helvetica", sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            font-size: 3.5rem;
            margin: 10px 0 5px 0;
            letter-spacing: 2px;
        }

        h2 {
            margin: 40px 0 20px 0;
            font-weight: 400;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 1.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            padding-bottom: 8px;
            width: 100%;
            text-align: center;
        }

        main {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ==========================================================================
           3. NAVIGATION LINKS
           ========================================================================== */
        .nav-links {
            list-style: none;
            padding: 0;
            margin: 20px 0 40px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.3s ease;
        }

        .nav-links a:hover {
            border-bottom: 1px solid white;
            opacity: 0.9;
        }

        /* ==========================================================================
           4. PORTFOLIO ELEMENTS (HERO IMAGE & 3D ENVIRONMENT)
           ========================================================================== */
        .portfolio-img {
            width: 100%;
            max-width: 800px;
            height: auto;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .model-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        model-viewer {
            width: 100%;
            height: 500px;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        /* ==========================================================================
           5. ARTWORK GALLERY SYSTEM
           ========================================================================== */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            margin-bottom: 50px;
        }

        .gallery-item {
            background-color: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
            transition: transform 0.3s ease;
        }

        .gallery-item:hover {
            transform: translateY(-5px);
        }

        .gallery-item img {
            width: 100%;
            height: auto;
            border-radius: 6px;
            display: block;
        }

        .gallery-item p {
            margin: 12px 0 4px 0;
            font-size: 0.9rem;
            text-align: center;
            opacity: 0.8;
            letter-spacing: 0.5px;
        }

        /* ==========================================================================
           6. FOOTER
           ========================================================================== */
        footer {
            margin-top: auto;
            padding-top: 40px;
            font-size: 0.8rem;
            opacity: 0.7;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <header>
        <h1>Alma Contreras</h1>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Art Portfolio</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>

        <img src="assets/iteration1.png" alt="Iteration 1 Display" class="portfolio-img">

        <section class="model-container">
            <h2>3D Artifact Study</h2>
            <model-viewer
                src="assets/assets.glb"
                poster="assets/lacmawall.png"
                alt="A 3D model of a creative artifact"
                shadow-intensity="1"
                camera-controls
                auto-rotate
                ar
                ar-modes="webxr scene-viewer quick-look"
                touch-action="pan-y">
            </model-viewer>
        </section>

        <h2>Selected Artworks</h2>
        <section class="gallery-grid">

            <div class="gallery-item">
                <img src="assets/iteration-3-01.png" alt="Iteration 3 Panel">
                <p>Iteration 3</p>
            </div>

            <div class="gallery-item">
                <img src="assets/iteration2.png" alt="Iteration 2 Panel">
                <p>Iteration 2</p>
            </div>

            <div class="gallery-item">
                <img src="assets/iteration1.png" alt="Iteration 1 Panel">
                <p>Iteration 1</p>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 Alma Contreras</p>
    </footer>

</body>
</html>
